name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: PHP ${{ matrix.php }} validation
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['7.4', '8.1', '8.2', '8.3']

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP files
        run: find . -path ./.git -prune -o -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run smoke test
        run: composer test
